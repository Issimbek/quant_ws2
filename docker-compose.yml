version: '3.8'

services:
  ros2_jazzy:
    build:
      context: .
      dockerfile: Dockerfile
    image: quant_pnp_ros2
    container_name: ros2_jazzy_container
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    volumes:
      - ./src:/ros2_ws/src:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority
    working_dir: /ros2_ws
    command: bash
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
